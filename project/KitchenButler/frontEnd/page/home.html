<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 私人厨师</title>
    <link rel="stylesheet" href="../css/home.css" />
  </head>
  <body>
    <div id="app" class="container">
      <!-- 顶部标题 -->
      <div class="header">
        <div class="logo">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
        </div>
        <div class="header-text">
          <h1>AI 私人厨师</h1>
          <p>上传食材图片，获取个性化食谱推荐</p>
        </div>
        <div class="user-avatar">N</div>
      </div>

      <!-- 主体内容（仅在无消息时显示） -->
      <div v-if="messages.length === 0" class="main">
        <div class="icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
        </div>
        <h2>上传食材图片开始吧</h2>
        <p>我会帮您识别食材并推荐食谱</p>
      </div>

      <!-- 聊天容器 -->
      <div
        ref="chatContainer"
        class="chat-container"
        :style="{ display: messages.length ? 'block' : 'none' }"
      >
        <div
          v-for="(msg, index) in messages"
          :key="index"
          :class="['message', msg.type]"
        >
          <div v-if="msg.type === 'user'" class="user-message">
            <div class="avatar-icon">N</div>
            <div>
              <img v-if="msg.image" :src="msg.image" alt="食材图片" />
              <p>{{ msg.content }}</p>
            </div>
          </div>
          <div v-else class="bot-message">
            <div class="avatar-icon">chef</div>
            <div v-html="formatBotMessage(msg.content)"></div>
          </div>
        </div>
      </div>

      <!-- 输入区域 -->
      <div class="input-area">
        <input
          type="file"
          ref="fileInput"
          accept="image/*"
          style="display: none"
          @change="handleFileSelect"
        />
        <button class="btn-upload" @click="triggerFileInput" title="上传图片">
          <!-- SVG 图标 -->
        </button>
        <input
          v-model="inputText"
          @keypress.enter="sendMessage"
          placeholder="描述你有的食材..."
        />
        <button class="btn-send" @click="sendMessage" title="发送">
          <!-- SVG 图标 -->
        </button>
      </div>
    </div>

    <script src="../js/axios.min.js"></script>
    <script src="../js/request.js"></script>
    <script src="../js/vue.global.js"></script>

    <script>
      const { createApp, ref, nextTick } = Vue;

      createApp({
        setup() {
          const messages = ref([]);
          const inputText = ref("");
          const chatContainer = ref(null);
          const fileInput = ref(null); // 用于绑定隐藏的 file input

          // 滚动到底部
          const scrollToBottom = () => {
            nextTick(() => {
              if (chatContainer.value) {
                chatContainer.value.scrollTop =
                  chatContainer.value.scrollHeight;
              }
            });
          };

          // 格式化 Bot 消息为 HTML
          const formatBotMessage = (data) => {
            if (typeof data === "string") return data;

            let html = "";
            if (data.ingredients && data.recipes) {
              html += `<h3>根据您的食材，推荐以下方案：</h3>`;
              if (data.ingredients.length > 0) {
                html += `<div class="section-title">识别到的食材</div><ul>`;
                data.ingredients.forEach(
                  (item) => (html += `<li>${item}</li>`),
                );
                html += `</ul>`;
              }
              if (data.recipes.length > 0) {
                html += `<div class="section-title">推荐食谱</div><p>`;
                data.recipes.forEach((recipe) => (html += `✅ ${recipe}<br/>`));
                html += `</p>`;
              }
            } else {
              html = data.message || JSON.stringify(data);
            }
            return html;
          };

          // 处理文件选择与上传
          const handleFileSelect = async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // 重置 input 值，确保同一文件可重复上传
            event.target.value = "";

            // 生成本地预览图
            const previewUrl = URL.createObjectURL(file);

            // 添加用户消息
            messages.value.push({
              type: "user",
              content: "上传了一张食材图片",
              image: previewUrl,
            });

            try {
              // 1. 上传图片到 /upload
              const formData = new FormData();
              formData.append("file", file);
              const ingredients = await window.$http.post("/upload", formData);

              // 2. 用识别出的食材生成食谱
              const recipeData = await window.$http.post("/recipes/generate", {
                ingredients: ingredients,
              });

              // 添加 AI 回复
              messages.value.push({ type: "bot", content: recipeData });
            } catch (err) {
              console.error("上传或生成失败:", err);
              messages.value.push({
                type: "bot",
                content: {
                  message: "图片分析失败，请确保上传的是清晰的食材照片。",
                },
              });
            }

            scrollToBottom();
          };

          // 发送文本消息
          const sendMessage = async () => {
            const text = inputText.value.trim();
            if (!text) return;

            messages.value.push({ type: "user", content: text });
            inputText.value = "";

            try {
              const data = await window.$http.post("/recipes/generate", {
                description: text,
              });
              messages.value.push({ type: "bot", content: data });
            } catch (err) {
              messages.value.push({
                type: "bot",
                content: { message: "抱歉，我暂时无法生成建议，请稍后再试。" },
              });
            }

            scrollToBottom();
          };

          // 触发文件选择（供按钮调用）
          const triggerFileInput = () => {
            fileInput.value?.click();
          };

          return {
            messages,
            inputText,
            chatContainer,
            fileInput,
            formatBotMessage,
            handleFileSelect,
            sendMessage,
            triggerFileInput,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
