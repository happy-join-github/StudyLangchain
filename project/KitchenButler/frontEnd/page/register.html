<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - AI私人厨师</title>
  <link rel="stylesheet" href="../css/register.css" />
</head>
<body>
  <div id="app">
    <div class="register-container">
      <h2>创建账号</h2>
      <form @submit.prevent="handleSubmit" class="register-form">
        <div class="input-group">
          <input
            v-model="form.username"
            type="text"
            placeholder="用户名（仅字母数字下划线）"
            autocomplete="off"
          />
        </div>
        <div class="input-group">
          <input
            v-model="form.password"
            type="password"
            placeholder="密码（至少6位）"
          />
        </div>
        <div class="input-group">
          <input
            v-model="form.nickname"
            type="text"
            placeholder="昵称"
          />
        </div>
        <div class="input-group">
          <input
            v-model="form.phone"
            type="tel"
            placeholder="手机号"
          />
        </div>
        <div class="input-group">
          <input
            v-model="form.email"
            type="email"
            placeholder="邮箱"
          />
        </div>

        <div v-if="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>

        <button type="submit" :disabled="loading" class="register-btn">
          {{ loading ? '注册中...' : '立即注册' }}
        </button>
      </form>
      <p class="login-link">
        已有账号？<a href="./login.html">立即登录</a>
      </p>
    </div>
  </div>

  <script src="../js/vue.global.js"></script>
  <script src="../js/axios.min.js"></script>
  <script src="../js/request.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue;

    createApp({
      setup() {
        const form = reactive({
          username: '',
          password: '',
          nickname: '',
          phone: '',
          email: ''
        });
        const loading = ref(false);
        const errorMessage = ref('');

        // 简单校验函数
        const validate = () => {
          const { username, password, nickname, phone, email } = form;

          if (!username.trim()) return '请输入用户名';
          if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) return '用户名只能包含字母、数字、下划线，长度3-20';

          if (!password.trim()) return '请输入密码';
          if (password.length < 6) return '密码至少6位';

          if (!nickname.trim()) return '请输入昵称';

          if (!phone.trim()) return '请输入手机号';
          if (!/^1[3-9]\d{9}$/.test(phone)) return '手机号格式不正确';

          if (!email.trim()) return '请输入邮箱';
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return '邮箱格式不正确';

          return null;
        };

        const handleSubmit = async () => {
          errorMessage.value = '';
          const err = validate();
          if (err) {
            errorMessage.value = err;
            return;
          }

          loading.value = true;
          try {
            const res = await $http.post('/register', {
              username: form.username.trim(),
              password: form.password,
              nickname: form.nickname.trim(),
              phone: form.phone.trim(),
              email: form.email.trim()
            });

            if (res.success) {
              alert('注册成功！即将跳转到登录页...');
              window.location.href = './login.html';
            } else {
              errorMessage.value = res.message || '注册失败，请稍后重试';
            }
          } catch (err) {
            console.error(err);
            errorMessage.value = '网络错误，请检查服务是否启动';
          } finally {
            loading.value = false;
          }
        };

        return {
          form,
          loading,
          errorMessage,
          handleSubmit
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
