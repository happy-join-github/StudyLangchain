    <meta charset="UTF-8" />

  </head>
  <body>
    <div class="container">
      <h1>AI私人厨师</h1>
      用户名<input type="text" id="username" placeholder="用户名" /> 密码<input
        type="password"
        id="pwd"
        placeholder="密码"
      />
      <button onclick="login()">获取菜谱</button>
    </div>

    <script src="js/axios.min.js"></script>
    <script src="js/request.js"></script>
    <script>
      function login() {
        const username = document.querySelector("#username").value;
        const password = document.querySelector("#pwd").value;
        $http.get("/login", {
            params: { username, password },
          })
          .then((data) => {
            console.log("菜谱:", data);
          });
      }
    </script>
  </body>
